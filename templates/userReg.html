{% extends 'index.html' %} 
{% block content %}

<!-- User Registration Section -->
<section id="register" class="register section">
    
    
    <!-- Section Title -->
    <div class="container section-title" data-aos="fade-up">
        <h2>Register Now</h2>
        <p><span>User</span> <span class="description-title">Registeration</span></p>
      </div><!-- End Section Title -->

    <!-- End Section Header -->

    <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="card shadow-lg border-0 rounded-3 p-4">
            <form action="" method="post" class="registration-form" data-aos="fade-up" data-aos-delay="200">
                {% csrf_token %}
                <div class="row gy-3">
                    
                    <div class="col-md-6">
                        <input type="text" id="name" name="name" pattern="[A-Za-z]{,}" class="form-control" placeholder="Enter your name" required>
                    </div>
                    
                    <div class="col-md-6">
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="col-md-6">
                        <input pattern="[6789][0-9]{9}" maxlength="10" type="tel" id="email" name="phone" class="form-control" placeholder="Enter your Phone no." required>
                    </div>

                    <div class="col-md-6">
                        <input type="password" id="email" name="password" class="form-control" placeholder="Password" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
                    </div>
                    
                    <div class="col-md-12">
                        <textarea id="message" name="address" class="form-control" rows="3" placeholder="Enter your address" required></textarea>
                    </div>

                    <div class="col-md-12">
                        <textarea id="message" name="goal" class="form-control" rows="3" placeholder="Enter your goal" required></textarea>
                    </div>
                    
                    <div class="col-12 text-center mt-3">
                        <button type="submit" class="btn btn-primary px-4 py-2">Register</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
<!-- End User Registration Section -->

{% if msg %}
<script>
  alert("{{ msg }}")
</script>
{% endif %}

{% endblock %}
