{% extends 'userHome.html' %} 
{% block content %}

<style>
    /* General Styling */
    body {
        background-color: #f8f9fa;
        font-family: 'Poppins', sans-serif;
    }

    .feedback-container {
        max-width: 700px;
        background: #fff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        margin-top: 50px;
    }

    .feedback-title {
        font-size: 28px;
        font-weight: 600;
        color: #333;
        margin-bottom: 10px;
    }

    .feedback-subtitle {
        color: #777;
        font-size: 14px;
    }

    .feedback-textarea {
        width: 100%;
        height: 150px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        resize: none;
        transition: 0.3s ease-in-out;
    }

    .feedback-textarea:focus {
        border-color: #007bff;
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        outline: none;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background: #007bff;
        border: none;
        color: #fff;
        font-size: 18px;
        font-weight: 500;
        border-radius: 8px;
        transition: 0.3s;
    }

    .submit-btn:hover {
        background: #0056b3;
        cursor: pointer;
    }

    .rating-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
    }

    /* Rating Stars */
    .rate {
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
        gap: 5px;
    }

    .rate input {
        display: none;
    }

    .rate label {
        font-size: 30px;
        color: #ccc;
        cursor: pointer;
    }

    .rate input:checked ~ label {
        color: #ffc700;
    }

    .rate label:hover,
    .rate label:hover ~ label {
        color: #deb217;
    }

</style>

<main class="main">
    <section class="py-5">
        <div class="container text-center">
            <div class="feedback-container mx-auto">
                <!-- Section Title -->
                <div class="container section-title" data-aos="fade-up">
                    <p><span>Add</span> <span class="description-title">Feedback<br></span></p>
                    <h2 >We value your feedback. Let us know how we can improve!</h2>
                <!-- End Section Title -->
                 <br><br>
                
                
                <form action="" method="post">
                    {% csrf_token %}

                    <!-- Rating Section -->
                    <div class="rating-container">
                        <div class="rate">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                        </div>
                    </div>

                    <!-- Feedback Textarea -->
                    <textarea name="feedback" class="feedback-textarea" placeholder="Write your feedback here..." required></textarea>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </div>
        </div>
    </section>
</main>
{% if messages %}
{% for i in messages %}
<script>
    alert("{{ i }}")
</script>
{% endfor %}
{% endif %}

{% endblock %}
