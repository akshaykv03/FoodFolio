{% extends 'userHome.html' %} 
{% block content %}

<!-- Users Management Section -->
<section id="users" class="users section">

    <!-- Section Title -->
    <div class="container section-title text-center" data-aos="fade-up">
        <!-- <h2 class="fw-bold">Cart</h2> -->
        <p><span>Your</span> <span class="description-title">Orders<br></span></p>
    </div>
    <!-- End Section Title -->

    <div class="container">
        <div class="row gy-4">
            <div class="col-lg-12 d-flex align-items-stretch" data-aos="fade-up" data-aos-delay="100">
                
                    <div class="card-body text-center ">
                        
                           
                                <table class="table table-striped table-bordered text-center align-middle shadow">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>DATE</th>
                                            <th>FOOD</th>
                                            <th>IMAGE</th>
                                            <th>COUNT</th>
                                            <th>PRICE</th>
                                            <th>TOTAL</th>
                                            <th>ACTION</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {% for i in data %}
                                        <tr>
                                            <td>{{ i.cart_date }}</td>
                                            <td>{{ i.food.name }}</td>
                                            <td><img src="static/media/{{ i.food.image }}" width="130" alt=""> </td>
                                            <td>{{ i.count }}</td>
                                            <td>{{ i.food.price }}</td>
                                            <td>{{ i.total }}</td>
                                            <td><a href="/userRemove?id={{ i.id }}">Remove</a></td>
                                            </tr>
                                        {% endfor %}
                                    </tbody>
                                </table>
                                <center><h2>Total : {{ rate }} Rs/-</h2>
                                    <a href="/userPay" class="btn btn-success ">Pay & Buy Now</a></center>
                            
                        
                        
                    </div>
              
            </div>
        </div>
    </div>
</section>
<!-- End Users Management Section -->
<br><br>
{% endblock %}
